<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VigieContrat — FlowForges</title>
  <meta name="description" content="VigieContrat — Bientôt disponible sur l'App Store.">
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #C62828;
      --bg: #F6F7FA;
      --surface: #FFFFFF;
      --text: #0D1320;
      --text-secondary: #5A6577;
      --text-tertiary: #8B95A5;
      --border-light: #E8EBF0;
      --radius: 12px;
      --shadow-sm: 0 1px 3px rgba(13,19,32,0.06);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.6; -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      box-shadow: var(--shadow-sm);
      max-width: 400px;
      width: 100%;
    }
    .app-icon {
      width: 56px; height: 56px;
      background: #FFEBEE;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      margin: 0 auto 1.5rem;
    }
    h1 {
      font-size: 1.6rem; font-weight: 800;
      letter-spacing: -0.5px; margin-bottom: 0.75rem;
    }
    .status {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem; font-weight: 700;
      padding: 4px 12px; border-radius: 20px;
      background: #FFEBEE; color: #92660A;
      border: 1px solid rgba(212,168,67,0.3);
      margin-bottom: 2rem;
      letter-spacing: 0.5px;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.85rem; font-weight: 500;
      color: var(--text-tertiary);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="card">
    <div class="app-icon">📋</div>
    <h1>VigieContrat</h1>
    <div class="status">Bêta fermée</div>
    <br>
    <a class="back-link" href="../">← Retour FlowForges</a>
  </div>
</body>
</html>
